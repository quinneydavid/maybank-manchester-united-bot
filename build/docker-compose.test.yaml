version: '3.8'
services:
  mufc-match-notifier:
    image: mufc-match-notifier:test
    container_name: mufc-match-notifier-test
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY}
      - ODDS_API_BASE_URL=${ODDS_API_BASE_URL}
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
      - FOOTBALL_DATA_BASE_URL=${FOOTBALL_DATA_BASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Singapore
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
